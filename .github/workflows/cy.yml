name: React CI/CD

on:
  push:
    branches: [master]

env:
  APP_NAME: crm-front
  APP_DIR: /opt/crm-front
  BUILD_DIR: /opt/crm-front/dist
  SERVICE_NAME: crm-front
  SERVICE_FILE: /etc/systemd/system/crm-front.service
  PORT: 3000
  NODE_VERSION: 22
  SERVE_VERSION: 14.2.4

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Mostrar versões (job)
        run: |
          node -v
          npm -v

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Garantir diretórios de deploy
        run: |
          sudo mkdir -p "${{ env.APP_DIR }}"
          sudo mkdir -p "${{ env.BUILD_DIR }}"

      - name: Copiar build (dist -> /opt)
        run: |
          sudo rm -rf "${{ env.BUILD_DIR }}"
          sudo mkdir -p "${{ env.BUILD_DIR }}"
          sudo cp -a dist/. "${{ env.BUILD_DIR }}/"

      - name: Instalar serve local no APP_DIR
        run: |
          sudo npm install --prefix "${{ env.APP_DIR }}" "serve@${{ env.SERVE_VERSION }}" --omit=dev --no-audit --no-fund

      - name: Criar ou atualizar service
        run: |
          sudo tee "${{ env.SERVICE_FILE }}" > /dev/null <<EOF
          [Unit]
          Description=CRM Front
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=${{ env.APP_DIR }}
          Environment=NODE_ENV=production
          ExecStartPre=/usr/bin/test -d "${{ env.BUILD_DIR }}"
          ExecStart=${{ env.APP_DIR }}/node_modules/.bin/serve -s "${{ env.BUILD_DIR }}" -l "${{ env.PORT }}"
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Reload systemd
        run: sudo systemctl daemon-reload

      - name: Enable service
        run: sudo systemctl enable "${{ env.SERVICE_NAME }}"

      - name: Reiniciar serviço
        run: sudo systemctl restart "${{ env.SERVICE_NAME }}"

      - name: Ver status do serviço
        run: sudo systemctl status "${{ env.SERVICE_NAME }}" --no-pager -l

      - name: Health check
        run: curl -fsS "http://localhost:${{ env.PORT }}"
